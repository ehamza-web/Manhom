          <img src="https://manhom.com/asset/svg/manhomlogo.svg" alt="من هم" style={{ height: 32 }} onError={(e) => { e.target.outerHTML = '<div style="font-weight:900;font-size:22px;color:#4169E1">من هم</div>'; }} />
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: '#6b7280', background: 'white', padding: '6px 12px', borderRadius: 100, border: '1px solid #e6e6e6' }}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><rect x="4" y="10" width="16" height="11" rx="2" stroke="#16a34a" strokeWidth="2"/><path d="M8 10V7a4 4 0 018 0v3" stroke="#16a34a" strokeWidth="2"/></svg>
            اتصال آمن ومشفّر · مدعوم من <strong style={{ color: '#1a1f36' }}>Stripe</strong>
          </div>
        </div>

        <Stepper />

        {step === 'intro' &&
        <div style={{ background: 'white', borderRadius: 16, padding: '40px 36px', boxShadow: '0 2px 12px rgba(0,0,0,0.04)', border: '1px solid #e6e6e6' }}>
            {/* Success banner */}
            <div style={{ background: '#ecfdf5', border: '1px solid #a7f3d0', borderRadius: 10, padding: '12px 16px', display: 'flex', alignItems: 'center', gap: 10, marginBottom: 28 }}>
              <div style={{ width: 28, height: 28, borderRadius: '50%', background: '#16a34a', color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 900, flexShrink: 0 }}>✓</div>
              <div>
                <div style={{ fontSize: 14, fontWeight: 700, color: '#065f46' }}>تم الدفع بنجاح</div>
                <div style={{ fontSize: 12.5, color: '#047857' }}>اشتراك "{plan?.title || 'الأساسية'}" {plan?.cycle === 'yearly' ? 'السنوي' : 'الشهري'} مفعّل. الخطوة الأخيرة: توثيق هويتك.</div>
              </div>
            </div>

            <div style={{ textAlign: 'center', marginBottom: 28 }}>
              {/* Passport icon */}
              <div style={{ width: 96, height: 96, margin: '0 auto 20px', background: 'linear-gradient(135deg,#eff6ff,#dbeafe)', borderRadius: 24, display: 'flex', alignItems: 'center', justifyContent: 'center', border: '1px solid #bfdbfe' }}>
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none">
                  <rect x="5" y="3" width="14" height="18" rx="2" stroke="#0570de" strokeWidth="1.5"/>
                  <circle cx="12" cy="10" r="2.5" stroke="#0570de" strokeWidth="1.5"/>
                  <path d="M8 16c1-1.5 2.5-2 4-2s3 .5 4 2" stroke="#0570de" strokeWidth="1.5" strokeLinecap="round"/>
                  <path d="M9 6h6" stroke="#0570de" strokeWidth="1.5" strokeLinecap="round"/>
                </svg>
              </div>
              <h1 style={{ fontSize: 26, fontWeight: 900, color: '#1a1f36', margin: '0 0 10px' }}>توثيق هويتك</h1>
              <p style={{ fontSize: 15, color: '#4b5563', lineHeight: 1.7, margin: '0 auto', maxWidth: 480 }}>
                يرجى تجهيز <strong>جواز سفرك الأصلي ساري المفعول</strong>. ستحتاج لاستخدام كاميرا الهاتف أو الحاسوب لالتقاط صورة واضحة له ولصورة شخصية (Selfie).
              </p>
            </div>

            {/* Requirements list */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12, marginBottom: 28 }}>
              {[
            { ic: '📄', t: 'جواز سفر أصلي', s: 'ساري المفعول' },
            { ic: '📷', t: 'كاميرا واضحة', s: 'هاتف أو حاسوب' },
            { ic: '💡', t: 'إضاءة جيدة', s: 'بدون انعكاسات' }].
              map((r, i) =>
            <div key={i} style={{ background: '#f8fafc', border: '1px solid #e6e6e6', borderRadius: 10, padding: '14px 12px', textAlign: 'center' }}>
                  <div style={{ fontSize: 22, marginBottom: 6 }}>{r.ic}</div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: '#1a1f36' }}>{r.t}</div>
                  <div style={{ fontSize: 11.5, color: '#6b7280', marginTop: 2 }}>{r.s}</div>
                </div>
            )}
            </div>

            {/* Trust/security note */}
            <div style={{ background: '#f6f9fc', border: '1px solid #e6e6e6', borderRadius: 10, padding: '14px 16px', display: 'flex', gap: 12, marginBottom: 24 }}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0, marginTop: 2 }}>
                <rect x="4" y="10" width="16" height="11" rx="2" stroke="#0570de" strokeWidth="1.8"/>
                <path d="M8 10V7a4 4 0 018 0v3" stroke="#0570de" strokeWidth="1.8"/>
              </svg>
              <div style={{ fontSize: 12.5, color: '#4b5563', lineHeight: 1.7 }}>
                يتم معالجة بياناتك وتشفيرها بأمان بالكامل بواسطة <strong style={{ color: '#1a1f36' }}>Stripe</strong> المتوافقة مع معايير الأمان العالمية (GDPR · SOC 2). <strong style={{ color: '#1a1f36' }}>لا نقوم بحفظ مستنداتك على خوادمنا.</strong>
              </div>
            </div>

            <button onClick={() => setStep('passport')} style={{ width: '100%', background: '#0570de', color: 'white', border: 0, borderRadius: 8, padding: '14px 0', fontSize: 16, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit', marginBottom: 12 }}>
              البدء في توثيق الهوية
            </button>
            <button onClick={() => onNav('home')} style={{ width: '100%', background: 'transparent', color: '#6b7280', border: 0, padding: '10px 0', fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit', textDecoration: 'underline' }}>
              إكمال التوثيق لاحقاً
            </button>
          </div>
        }

        {step === 'passport' &&
        <div style={{ background: 'white', borderRadius: 16, padding: '36px', boxShadow: '0 2px 12px rgba(0,0,0,0.04)', border: '1px solid #e6e6e6' }}>
            <div style={{ fontSize: 12, color: '#0570de', fontWeight: 700, marginBottom: 8 }}>الخطوة 1 من 2</div>
            <h2 style={{ fontSize: 22, fontWeight: 900, color: '#1a1f36', margin: '0 0 8px' }}>التقط صورة لجواز السفر</h2>
            <p style={{ fontSize: 14, color: '#6b7280', margin: '0 0 24px', lineHeight: 1.7 }}>تأكد من ظهور صفحة الصورة كاملة، مع وضوح كل البيانات ورمز MRZ في الأسفل.</p>
            <div style={{ aspectRatio: '16/10', background: '#1a1f36', borderRadius: 12, position: 'relative', overflow: 'hidden', marginBottom: 20 }}>
              {/* Camera viewfinder */}
              <div style={{ position: 'absolute', inset: '12% 8%', border: '2px dashed rgba(255,255,255,0.6)', borderRadius: 8, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <div style={{ background: 'rgba(255,255,255,0.92)', borderRadius: 6, padding: '14px 18px', color: '#1a1f36', display: 'flex', alignItems: 'center', gap: 10 }}>
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><rect x="5" y="3" width="14" height="18" rx="2" stroke="#0570de" strokeWidth="1.5"/><circle cx="12" cy="10" r="2.5" stroke="#0570de" strokeWidth="1.5"/></svg>
                  <div><div style={{ fontSize: 13, fontWeight: 700 }}>ضع جواز السفر داخل الإطار</div><div style={{ fontSize: 11, color: '#6b7280' }}>سيتم الالتقاط تلقائياً</div></div>
                </div>
              </div>
              {/* Corner markers */}
              {[['top:0;left:0;border-top:3px solid #00d66f;border-left:3px solid #00d66f', '0 0 0 0'], ['top:0;right:0;border-top:3px solid #00d66f;border-right:3px solid #00d66f', '0 0 0 0'], ['bottom:0;left:0;border-bottom:3px solid #00d66f;border-left:3px solid #00d66f', '0 0 0 0'], ['bottom:0;right:0;border-bottom:3px solid #00d66f;border-right:3px solid #00d66f', '0 0 0 0']].map((c, i) => <div key={i} style={{ position: 'absolute', width: 24, height: 24, ...Object.fromEntries(c[0].split(';').map((x) => x.split(':').map((y, j) => j === 1 ? y.replace(/border-([a-z]+):/, '').trim() : y))) }}></div>)}
            </div>
            <button onClick={() => setStep('selfie')} style={{ width: '100%', background: '#0570de', color: 'white', border: 0, borderRadius: 8, padding: '14px 0', fontSize: 15, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit', marginBottom: 10 }}>التقطت الصورة — متابعة</button>
            <button onClick={() => setStep('intro')} style={{ width: '100%', background: 'transparent', color: '#6b7280', border: '1px solid #e6e6e6', borderRadius: 8, padding: '12px 0', fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>رجوع</button>
          </div>
        }

        {step === 'selfie' &&
        <div style={{ background: 'white', borderRadius: 16, padding: '36px', boxShadow: '0 2px 12px rgba(0,0,0,0.04)', border: '1px solid #e6e6e6' }}>
            <div style={{ fontSize: 12, color: '#0570de', fontWeight: 700, marginBottom: 8 }}>الخطوة 2 من 2</div>
            <h2 style={{ fontSize: 22, fontWeight: 900, color: '#1a1f36', margin: '0 0 8px' }}>التقط صورة شخصية (Selfie)</h2>
            <p style={{ fontSize: 14, color: '#6b7280', margin: '0 0 24px', lineHeight: 1.7 }}>انظر مباشرة إلى الكاميرا، تأكد من إضاءة الوجه جيداً، وأزِل النظارات إن أمكن.</p>
            <div style={{ aspectRatio: '4/5', maxWidth: 360, margin: '0 auto 20px', background: '#1a1f36', borderRadius: 12, position: 'relative', overflow: 'hidden' }}>
              <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%,-50%)', width: '65%', aspectRatio: '3/4', border: '3px dashed rgba(0,214,111,0.8)', borderRadius: '50%' }}></div>
              <div style={{ position: 'absolute', bottom: 20, left: 0, right: 0, textAlign: 'center', color: 'white', fontSize: 13, fontWeight: 600 }}>ضع وجهك داخل الإطار البيضاوي</div>
            </div>
            <button onClick={() => setStep('review')} style={{ width: '100%', background: '#0570de', color: 'white', border: 0, borderRadius: 8, padding: '14px 0', fontSize: 15, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit', marginBottom: 10 }}>التقطت الصورة — متابعة</button>
            <button onClick={() => setStep('passport')} style={{ width: '100%', background: 'transparent', color: '#6b7280', border: '1px solid #e6e6e6', borderRadius: 8, padding: '12px 0', fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>رجوع</button>
          </div>
        }

        {step === 'review' &&
        <div style={{ background: 'white', borderRadius: 16, padding: '48px 36px', boxShadow: '0 2px 12px rgba(0,0,0,0.04)', border: '1px solid #e6e6e6', textAlign: 'center' }}>
            <div style={{ width: 80, height: 80, margin: '0 auto 20px', borderRadius: '50%', background: '#ecfdf5', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <svg width="44" height="44" viewBox="0 0 24 24" fill="none"><path d="M5 12l4 4L19 6" stroke="#16a34a" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
            <h2 style={{ fontSize: 24, fontWeight: 900, color: '#1a1f36', margin: '0 0 10px' }}>تم استلام مستنداتك</h2>
            <p style={{ fontSize: 14.5, color: '#4b5563', lineHeight: 1.7, margin: '0 auto 28px', maxWidth: 440 }}>
              يقوم نظام Stripe بمراجعة مستنداتك آلياً. عادةً ما تستغرق العملية أقل من دقيقتين، وقد تصل إلى 24 ساعة في بعض الحالات. ستصلك إشعارات عبر البريد الإلكتروني.
            </p>
            <button onClick={() => onNav('home')} style={{ background: '#0570de', color: 'white', border: 0, borderRadius: 8, padding: '13px 32px', fontSize: 15, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' }}>الذهاب إلى لوحة التحكم</button>
          </div>
        }
      </div>
    </div>);

};

// ═══════════════════ MODE TOGGLE ═══════════════════
const ModeToggle = ({ mode, setMode }) =>
<div style={{ position: 'fixed', top: 80, left: 14, zIndex: 1000, display: 'flex', gap: 6, background: 'rgba(15,23,42,0.92)', padding: 5, borderRadius: 100, boxShadow: '0 8px 24px rgba(0,0,0,0.18)', backdropFilter: 'blur(8px)' }}>
    <button onClick={() => setMode('flow')} style={{ background: mode === 'flow' ? 'white' : 'transparent', color: mode === 'flow' ? '#0f172a' : 'white', border: 0, padding: '7px 16px', borderRadius: 100, fontSize: 12, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' }}>الفلو التفاعلي</button>
  </div>;


// ═══════════════════ APP ═══════════════════
const App = () => {
  const [mode, setMode] = useState('flow');
  const [current, setCurrent] = useState('home');
  const [personId, setPersonId] = useState(null);
  const [plan, setPlan] = useState(null);

  const onNav = (screen, extra) => {
    setCurrent(screen);
    if (screen === 'profile' && extra) setPersonId(extra);
    if ((screen === 'checkout' || screen === 'verify') && extra) setPlan(extra);
    window.scrollTo({ top: 0, behavior: 'instant' });
  };

  const screenMap = {
    home: <ScreenHome onNav={onNav} />,
    search: <ScreenSearch onNav={onNav} />,
    categories: <ScreenCategories onNav={onNav} />,
    lists: <ScreenLists onNav={onNav} />,
    profile: <ScreenProfile onNav={onNav} personId={personId || 'masoud'} />,
    company: <ScreenCompany onNav={onNav} />,
    mawshoor: <ScreenMawshoor onNav={onNav} />,
    'mawshoor-list': <ScreenMawshoorList onNav={onNav} />,
    add: <ScreenAdd onNav={onNav} />,
    nominate: <ScreenNominate onNav={onNav} />,
    membership: <ScreenMembership onNav={onNav} />,
    checkout: <ScreenCheckout onNav={onNav} plan={plan} />,
    verify: <ScreenVerify onNav={onNav} plan={plan} />
  };

  return (
    <>
      {screenMap[current] || screenMap.home}
    </>);

};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);


</script>
</body>
</html>
